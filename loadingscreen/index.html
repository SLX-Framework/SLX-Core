<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLX - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="aurora"></div>
    <div class="noise-overlay"></div>
    <div class="vignette"></div>

    <div class="scan-line"></div>

    <div id="custom-cursor">
        <div class="cursor-dot"></div>
        <div class="cursor-ring"></div>
    </div>

    <div id="app">
        <div class="brand-container">
            <div class="brand-accent"></div>
            <div class="brand-logo">
                <img src="./image1.png" alt="SLX">
            </div>
            <div class="brand-text">
                <h1 class="brand-title">SLX</h1>
                <div class="brand-divider"></div>
                <p class="brand-tagline">CRIMELIFE SERVER</p>
            </div>
        </div>

        <div class="hero-section">
            <div class="hero-line hero-line-1"></div>
            <h2 class="hero-title">
                <span class="hero-word" style="animation-delay: 0.6s">WILLKOMMEN</span>
                <span class="hero-word accent" style="animation-delay: 0.8s">AUF</span>
                <span class="hero-word" style="animation-delay: 1.0s">DEM</span>
                <span class="hero-word accent" style="animation-delay: 1.2s">SERVER</span>
            </h2>
            <div class="hero-line hero-line-2"></div>
        </div>

        <div class="social-strip">
            <a class="social-link" href="#" data-link="https://discord.gg/silencelife" data-name="Discord">
                <i class="fab fa-discord"></i>
                <span>Discord</span>
                <span class="social-copied">Kopiert!</span>
            </a>
            <div class="social-dot"></div>
            <a class="social-link" href="#" data-link="ts3server://silencelife.de" data-name="TeamSpeak">
                <i class="fab fa-teamspeak"></i>
                <span>TeamSpeak</span>
                <span class="social-copied">Kopiert!</span>
            </a>
            <div class="social-dot"></div>
            <a class="social-link" href="#" data-link="https://www.tiktok.com/@silencelifev2" data-name="TikTok">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
                <span class="social-copied">Kopiert!</span>
            </a>
        </div>

        <div class="player-container">
            <div class="player-art">
                <div class="player-eq">
                    <span class="eq-bar"></span>
                    <span class="eq-bar"></span>
                    <span class="eq-bar"></span>
                    <span class="eq-bar"></span>
                    <span class="eq-bar"></span>
                </div>
            </div>
            <div class="player-info">
                <div class="player-track" id="current-track">Bereit...</div>
                <div class="player-progress">
                    <div class="player-progress-fill" id="music-progress"></div>
                </div>
            </div>
            <div class="player-controls">
                <button class="player-btn" id="prev-btn"><i class="fas fa-backward-step"></i></button>
                <button class="player-btn player-btn-main" id="play-btn"><i class="fas fa-play" id="play-icon"></i></button>
                <button class="player-btn" id="next-btn"><i class="fas fa-forward-step"></i></button>
            </div>
            <audio id="audio" preload="auto"></audio>
        </div>

        <div class="loader-container">
            <div class="loader-info">
                <span class="loader-label">LADEN</span>
                <span class="loader-percent" id="loading-text">0%</span>
            </div>
            <div class="loader-track">
                <div class="loader-fill" id="loading-progress"></div>
            </div>
        </div>
    </div>

    <div id="spawn-overlay">
        <div class="spawn-brand">
            <img src="./image1.png" alt="SLX" class="spawn-logo">
            <div class="spawn-brand-text">
                <span class="white">Crime</span><span class="accent">Life</span>
            </div>
        </div>
        <div class="spawn-loader">
            <div class="spawn-spinner"></div>
            <div class="spawn-status" id="spawn-status">Spieler wird geladen...</div>
        </div>
    </div>

    <script>
        (function() {
            var cursor = document.getElementById('custom-cursor');
            var dot = cursor.querySelector('.cursor-dot');
            var ring = cursor.querySelector('.cursor-ring');
            var mx = -100, my = -100, rx = -100, ry = -100;

            document.addEventListener('mousemove', function(e) {
                mx = e.clientX;
                my = e.clientY;
                dot.style.left = mx + 'px';
                dot.style.top = my + 'px';
                cursor.classList.add('visible');
            });

            function animateRing() {
                rx += (mx - rx) * 0.15;
                ry += (my - ry) * 0.15;
                ring.style.left = rx + 'px';
                ring.style.top = ry + 'px';
                requestAnimationFrame(animateRing);
            }
            animateRing();

            document.addEventListener('mousedown', function() { cursor.classList.add('clicking'); });
            document.addEventListener('mouseup', function() { cursor.classList.remove('clicking'); });

            document.querySelectorAll('a, button, .social-link, .player-btn').forEach(function(el) {
                el.addEventListener('mouseenter', function() { cursor.classList.add('hover'); });
                el.addEventListener('mouseleave', function() { cursor.classList.remove('hover'); });
            });
        })();

        (function() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let w, h;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            function createParticle() {
                return {
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 1.5 + 0.3,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.15 - 0.1,
                    alpha: Math.random() * 0.4 + 0.1,
                    pulse: Math.random() * Math.PI * 2,
                };
            }

            for (let i = 0; i < 80; i++) particles.push(createParticle());

            function drawParticles() {
                ctx.clearRect(0, 0, w, h);
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.pulse += 0.015;
                    const a = p.alpha * (0.6 + Math.sin(p.pulse) * 0.4);
                    if (p.x < -10 || p.x > w + 10 || p.y < -10 || p.y > h + 10) {
                        particles[i] = createParticle();
                        particles[i].y = h + 5;
                        continue;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(220, 50, 50, ${a})`;
                    ctx.fill();
                }
                requestAnimationFrame(drawParticles);
            }
            drawParticles();
        })();

        (function() {
            const links = document.querySelectorAll('.social-link');
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const url = this.getAttribute('data-link');
                    const ta = document.createElement('textarea');
                    ta.value = url;
                    ta.style.cssText = 'position:fixed;opacity:0;left:-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    this.classList.add('copied');
                    setTimeout(() => this.classList.remove('copied'), 1800);
                });
            });
        })();

        (function() {
            const audio = document.getElementById('audio');
            const playBtn = document.getElementById('play-btn');
            const playIcon = document.getElementById('play-icon');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const trackEl = document.getElementById('current-track');
            const progressEl = document.getElementById('music-progress');
            const eqBars = document.querySelectorAll('.eq-bar');

            let idx = 0, playing = false;
            const songs = [
                { audio: './music/song1.mp3', author: 'Buckshot', name: 'Fever' },
                { audio: './music/song2.mp3', author: '102 Boyz', name: 'Mindestens zu zweit' }
            ];

            function load(i) {
                const s = songs[i];
                audio.src = s.audio;
                trackEl.textContent = s.author + ' \u2014 ' + s.name;
            }

            function togglePlay() {
                if (playing) {
                    audio.pause();
                    playIcon.className = 'fas fa-play';
                    eqBars.forEach(b => b.style.animationPlayState = 'paused');
                } else {
                    audio.play();
                    playIcon.className = 'fas fa-pause';
                    eqBars.forEach(b => b.style.animationPlayState = 'running');
                }
                playing = !playing;
            }

            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', () => { idx = (idx - 1 + songs.length) % songs.length; load(idx); if (playing) audio.play(); });
            nextBtn.addEventListener('click', () => { idx = (idx + 1) % songs.length; load(idx); if (playing) audio.play(); });
            audio.addEventListener('timeupdate', () => {
                if (audio.duration) progressEl.style.width = (audio.currentTime / audio.duration * 100) + '%';
            });
            audio.addEventListener('ended', () => { idx = (idx + 1) % songs.length; load(idx); audio.play(); });
            load(idx);
        })();

        (function() {
            var fill = document.getElementById('loading-progress');
            var text = document.getElementById('loading-text');
            var spawnStarted = false;
            var lastPct = 0;
            var lastProgressTime = 0;
            var statusMessages = [
                'Spielermodell laden...',
                'Welt wird geladen...',
                'Spieler wird vorbereitet...',
                'Fast fertig...'
            ];

            function startSpawnPhase() {
                if (spawnStarted) return;
                spawnStarted = true;
                document.getElementById('app').style.display = 'none';
                document.getElementById('spawn-overlay').classList.add('active');
                var idx = 0;
                var statusEl = document.getElementById('spawn-status');
                statusEl.textContent = statusMessages[0];
                var interval = setInterval(function() {
                    idx++;
                    if (idx >= statusMessages.length) { clearInterval(interval); return; }
                    statusEl.textContent = statusMessages[idx];
                }, 1500);
            }

            window.addEventListener('message', function(e) {
                if (e.data.eventName === 'loadProgress') {
                    var pct = Math.floor(e.data.loadFraction * 100);
                    lastPct = pct;
                    lastProgressTime = Date.now();
                    fill.style.width = pct + '%';
                    text.textContent = pct + '%';
                    if (pct >= 100) startSpawnPhase();
                }
            });

            setInterval(function() {
                if (spawnStarted) return;
                if (lastPct >= 90 && lastProgressTime > 0 && (Date.now() - lastProgressTime) > 3000) {
                    startSpawnPhase();
                }
            }, 1000);
        })();
    </script>
</body>
</html>
